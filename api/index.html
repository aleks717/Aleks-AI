<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cerebras Llama 3.3</title><style>body{font-family:system-ui;background:#0a0a0a;color:#fff;margin:0;padding:20px}#chat{max-width:600px;margin:auto}#log{height:75vh;overflow:auto;border:1px solid #333;padding:10px;border-radius:8px;margin-bottom:10px}.u{text-align:right;color:#60a5fa;margin:8px 0}.b{color:#4ade80;white-space:pre-wrap;margin:8px 0}#q{width:75%;padding:12px;background:#1a1a1a;border:1px solid #333;color:#fff;border-radius:8px}button{padding:12px 18px;background:#f97316;border:0;color:#fff;border-radius:8px;margin-left:2%;font-weight:bold}</style></head>
<body><div id="chat"><h3>Cerebras Llama 3.3 70B - 1 Mio/Tag</h3><div id="log"></div><input id="q" placeholder="Frag was..." onkeydown="if(event.key==='Enter')send()"><button onclick="send()">Send</button></div>
<script>async function send(){let q=document.getElementById('q'),log=document.getElementById('log');if(!q.value)return;log.innerHTML+=`<div class=u>${q.value}</div>`;let t=q.value;q.value='';log.innerHTML+=`<div class=b id=t>Denke...</div>`;let r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})});let d=await r.json();document.getElementById('t').innerText=d.reply;log.scrollTop=log.scrollHeight}</script></body></html>
